name: Validate resources

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck scripts
        run: npm run typecheck
      - name: Validate resource data
        id: validate
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run validate > validate.log 2>&1
          status=$?
          cat validate.log
          {
            echo "status=$status"
            echo "report<<EOF"
            tail -n 120 validate.log
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Check generated files
        id: generated
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run generate:check > generated.log 2>&1
          status=$?
          cat generated.log
          {
            echo "status=$status"
            echo "report<<EOF"
            tail -n 120 generated.log
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Run full local checks
        run: npm run check
      - name: Check Vercel readiness
        run: npm run deploy:check
      - name: Build Next.js app
        run: npm run build
      - name: Smoke test production server
        shell: bash
        run: |
          npm run start -- -H 127.0.0.1 -p 3000 > next.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT

          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/api/health > /dev/null; then
              npm run smoke
              exit 0
            fi
            sleep 1
          done

          cat next.log
          exit 1
      - name: Comment on failed contribution
        if: github.event_name == 'pull_request' && (steps.validate.outputs.status != '0' || steps.generated.outputs.status != '0')
        uses: actions/github-script@v7
        env:
          VALIDATE_STATUS: ${{ steps.validate.outputs.status }}
          VALIDATE_REPORT: ${{ steps.validate.outputs.report }}
          GENERATED_STATUS: ${{ steps.generated.outputs.status }}
          GENERATED_REPORT: ${{ steps.generated.outputs.report }}
        with:
          script: |
            const sections = [];
            if (process.env.VALIDATE_STATUS !== '0') {
              sections.push([
                '### 数据校验',
                '```text',
                process.env.VALIDATE_REPORT.trim(),
                '```'
              ].join('\n'));
            }
            if (process.env.GENERATED_STATUS !== '0') {
              sections.push([
                '### 生成文件校验',
                '```text',
                process.env.GENERATED_REPORT.trim(),
                '```'
              ].join('\n'));
            }

            const marker = '<!-- awesome-wechat-weapp-validation -->';
            const body = [
              marker,
              '资源校验没有通过。',
              '',
              '请确认 `data/resources.yaml` 中的链接、分类、metadata 和重复链接符合校验规则，然后运行 `npm run check`。',
              '',
              ...sections
            ].join('\n');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
      - name: Clear resolved validation comment
        if: github.event_name == 'pull_request' && steps.validate.outputs.status == '0' && steps.generated.outputs.status == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- awesome-wechat-weapp-validation -->';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            const existing = comments.filter((comment) => comment.body?.includes(marker));

            for (const comment of existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id
              });
            }
      - name: Fail on validation errors
        if: steps.validate.outputs.status != '0' || steps.generated.outputs.status != '0'
        run: exit 1
